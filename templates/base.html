<html>
    <head>
        <title>reina's outfit archive</title>
        <link rel="stylesheet" href="/static/styles.css">
    </head>
    <body>
        <div class = "nav">
            <a href="{{ url_for('index') }}">home</a>
            <a href="#">closet</a>
            <a href="#">outfit logs</a>
        </div>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="flashes">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        {% block content %}
        {% endblock %}
    </body>
</html>
