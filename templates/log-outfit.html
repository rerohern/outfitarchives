{% extends "base.html" %}

{% block content %}
<h1>log an outfit!</h1>
<form method="POST">
  {{ form.hidden_tag() }}

  <!-- Core fields -->
  {{ form.date_worn.label }} {{ form.date_worn() }}
  {{ form.notes.label }} {{ form.notes() }}
  {{ form.tags.label }} {{ form.tags() }}

  <!-- Drag & Drop -->
  <div class="drag-drop-container" id="drag-drop-area">
      <p>Drag & drop images or click to select</p>
      <input type="file" id="file-input" multiple accept="image/*" hidden>
  </div>

  <!-- Preview -->
  <div class="preview-container" id="preview-container"></div>

  <!-- Hidden field to store media JSON -->
  <input type="hidden" name="media_data" id="media-data">

  {{ form.submit() }}
</form>


{% endblock %}
